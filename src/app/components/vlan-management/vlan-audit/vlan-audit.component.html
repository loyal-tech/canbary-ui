<div class="row">
  <div class="col-md-12">
    <div class="panel mb-15">
      <div class="panel-heading">
        <h3 class="panel-title">VLAN Audit</h3>
        <div class="right">
          <button
            aria-controls="searchPreCust"
            aria-expanded="false"
            class="btn-toggle-collapse"
            data-target="#searchPreCust"
            data-toggle="collapse"
            type="button"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>
      <div id="acctProfileSearchPanel" class="panel-collapse collapse in">
        <div class="panel-body">
          <div class="searchForm">
            <form class="form-auth-small" [formGroup]="searchProfileForm">
              <div class="row">
                <div class="col-lg-3 col-md-3 m-b-10">
                  <p-dropdown
                    [options]="searchOptionSelect"
                    optionValue="value"
                    optionLabel="label"
                    filter="true"
                    filterBy="label"
                    placeholder="Select a Search Option"
                    [(ngModel)]="searchOption"
                    [ngModelOptions]="{ standalone: true }"
                    (onChange)="selSearchOption($event)"
                  ></p-dropdown>
                </div>
                <div class="col-md-3" style="padding-left: 0%" *ngIf="searchOption == 'staffName'">
                  <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Staff Name"
                    formControlName="staffName"
                    (keydown.enter)="searchProfileByName()"
                  />
                </div>
                <div class="col-md-3" style="padding-left: 0%" *ngIf="searchOption == 'action'">
                  <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Enter Action"
                    formControlName="staffName"
                    (keydown.enter)="searchProfileByName()"
                  />
                </div>
                <div class="col-md-4" style="padding-left: 0%">
                  <button
                    type="submit"
                    class="btn btn-primary"
                    title="Search Profile"
                    data-toggle="tooltip"
                    (click)="searchProfileByName()"
                    [disabled]="
                      !searchProfileForm.value.staffName && !searchProfileForm.value.action
                    "
                  >
                    <i class="fa fa-search"></i>
                    Search
                  </button>
                  &nbsp;
                  <button
                    type="reset"
                    class="btn btn-default"
                    title="Clear"
                    data-toggle="tooltip"
                    (click)="clearSearchForm()"
                  >
                    <i class="fa fa-refresh"></i>
                    Clear
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-12 col-sm-12">
    <div class="panel">
      <div class="panel-heading">
        <h3 *ngIf="!iscustomerEdit" class="panel-title">Vlan Audit</h3>
        <div class="right">
          <button
            id="create"
            aria-controls="createPreCust"
            aria-expanded="false"
            class="btn-toggle-collapse"
            data-target="#createPreCust"
            data-toggle="collapse"
            type="button"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>

      <div class="panel-collapse collapse in" id="createPreCust">
        <div class="panel-body">
          <!-- Basic Details -->

          <div class="row">
            <div class="col-lg-12 col-md-12">
              <table class="table">
                <thead>
                  <tr>
                    <th>Vlan Name</th>
                    <th>Action</th>
                    <th>Staff name</th>
                    <th>Remark</th>
                    <th>Action Date</th>
                    <th>Details</th>
                    <th>File</th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    *ngFor="
                      let audit of auditDetails
                        | paginate
                          : {
                              id: 'listing_groupdata',
                              itemsPerPage: itemsPerPage,
                              currentPage: currentPage,
                              totalItems: totalRecords
                            };
                      index as i
                    "
                  >
                    <td>
                      <div *ngIf="audit.entitytName">
                        {{ audit.entitytName }}
                      </div>
                    </td>
                    <td>
                      <div>
                        {{ audit.action }}
                      </div>
                    </td>
                    <td>
                      <div>
                        {{ audit.actionByName }}
                      </div>
                    </td>
                    <td>
                      <div>
                        {{ audit.remark }}
                      </div>
                    </td>
                    <td>
                      <div>
                        {{ audit.actionDateTime | date: "yyyy-MM-dd hh:mm a" }}
                      </div>
                    </td>
                    <td>
                      <textarea
                        [(ngModel)]="audit.details"
                        readonly
                        rows="5"
                        style="
                          width: 100%;
                          border: none;
                          resize: none;
                          background-color: transparent;
                        "
                      >
                      </textarea>
                    </td>
                     <td>
                      <div *ngIf="audit.fileName">
                        <a
                        (click)="downloadAuditFile(audit.fileName)"
                        title="Click To See Radius Client Group Detail"
                        style="color: #f7b206"
                        class="curson_pointer"
                      >
                        {{ audit.fileName  }}
                        </a>
                      </div>
                      <div *ngIf="!audit.fileName">
                        N/A
                      </div>
                    </td>
                  </tr>
                </tbody>

                <ng-template #noRecords>
                  <tr>
                    <td colspan="1" class="text-center">No Record Found.</td>
                  </tr>
                </ng-template>
              </table>
              <br />
              <br />
              <div style="display: flex">
                <pagination-controls
                  id="listing_groupdata"
                  [maxSize]="10"
                  [directionLinks]="true"
                  previousLabel=""
                  nextLabel=""
                  (pageChange)="pageAuditChanged($event)"
                ></pagination-controls>
                <div id="itemPerPageDropdown">
                  <p-dropdown
                    [options]="pageLimitOptions"
                    optionLabel="value"
                    optionValue="value"
                    (onChange)="TotalItemPerPageAudit($event)"
                  ></p-dropdown>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
