<!doctype html>
<html lang="en" class="fullscreen-bg">
<head>
    <title>Login | Canbary Dashboard</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600,700" rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="76x76" href="assets/img/apple-icon.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="assets/img/favicon.png" />
</head>

<body class="loginbg">
    <ngx-spinner template='<img class="rotate" width="100" height="100" src="assets/img/ajaxwaiting.png" >'></ngx-spinner>

    <div id="wrapper" pFocusTrap>
        <div class="vertical-align-wrap">
            <div class="vertical-align-middle">
                
                <div class="auth-box">
                    <div class="left">
                        <div class="content">
                            <div class="header">
                                <div class="logo text-center">
                                    <img src="../../assets/img/loginlogo.jpg" alt="Canbary Logo" class="canbarylogo" />
                                </div>
                                <h1 class="auth-title">Login to your account</h1>
                                <!-- <p class="lead">Login to your account</p> -->
                            </div>

                            <form class="form-auth-small" [formGroup]="createLoginForm">
                                
                                <div class="form-group-custom">
                                    <label class="control-label-new">Username</label>
                                    <div class="input-wrapper">
                                        <i class="fa fa-user input-icon"></i>
                                        <input
                                            type="email"
                                            name="username"
                                            class="form-control-new"
                                            formControlName="username"
                                            [ngClass]="{'is-invalid': submitted && createLoginForm.controls.username.errors}"
                                            placeholder="Type your username"
                                        />
                                    </div>
                                    <div class="error-msg" *ngIf="submitted && createLoginForm.controls.username.errors?.required">
                                        Username is required
                                    </div>
                                </div>

                                <div class="form-group-custom">
                                    <label class="control-label-new">Password</label>
                                    <div class="input-wrapper">
                                        <i class="fa fa-lock input-icon"></i>
                                        <input
                                            [type]="_passwordType"
                                            class="form-control-new"
                                            name="password"
                                            placeholder="Type your password"
                                            formControlName="password"
                                            (keypress)="onPasswordKeyPress($event)"
                                            [ngClass]="{'is-invalid': (createLoginForm.controls.password.touched || submitted) && createLoginForm.controls.password.errors}"
                                        />
                                        <span class="password-toggle">
                                            <i class="fa" [ngClass]="showPassword ? 'fa-eye' : 'fa-eye-slash'"
                                               (click)="showPassword = !showPassword; _passwordType = showPassword ? 'text' : 'password'">
                                            </i>
                                        </span>
                                    </div>
                                    <div class="error-msg" *ngIf="(createLoginForm.controls.password.touched || submitted) && createLoginForm.controls.password.errors">
                                        <span *ngIf="createLoginForm.controls.password.errors.required">Password is required</span>
                                        <span *ngIf="createLoginForm.controls.password.errors.noSpace">No spaces allowed</span>
                                    </div>
                                </div>

                                <div class="form-group-custom animate-fade" *ngIf="showOtpInput">
                                    <label class="control-label-new">OTP</label>
                                    <div class="input-wrapper">
                                        <i class="fa fa-key input-icon"></i>
                                        <input type="text" name="otp" class="form-control-new" formControlName="otp" placeholder="Enter OTP" />
                                    </div>
                                    <div class="error-msg" *ngIf="otpSubmitted && createLoginForm.controls.otp.errors?.required">
                                        OTP is required
                                    </div>
                                </div>

                                <div class="captcha-wrapper" *ngIf="loginEnable">
                                    <ngx-captcha [config]="captchaConfig"></ngx-captcha>
                                    <div class="error-msg" *ngIf="captchaError">{{ captchaError }}</div>
                                    <div class="success-msg" *ngIf="captchaSuccess">{{ captchaSuccess }}</div>
                                </div>

                                <div class="form-actions">
                                    <div class="forgot-pwd-link">
                                        <a href="javascript:void(0)" (click)="getotp = true" class="forgot-pwd-link">
                                            Forgot password?
                                        </a>
                                    </div>

                                    <div class="btn-group-vertical">
                                        <button
                                            *ngIf="showOtpInput"
                                            type="button"
                                            class="btn btn-resend"
                                            (click)="resendotp()"
                                            [disabled]="resendOTP"
                                        >
                                            Resend OTP <span *ngIf="resendOTP"> ({{ otpCountDown }}) </span>
                                        </button>
                                        
                                        <button
                                            [disabled]="loginEnable"
                                            type="submit"
                                            class="btn-login-gradient"
                                            (click)="showOtpInput ? verifyOtp() : checkLogin()"
                                        >
                                            <i class="fa fa-sign-in" *ngIf="!showOtpInput"></i>
                                            <span>{{ showOtpInput ? "Verify OTP" : "LOGIN" }}</span>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    
                    <div class="right">
                        <div class="overlay"></div>
                        <div class="content text">
                            <h1 class="heading">Enterprise Solutions</h1>
                            <p>Network Management & Analytics</p>
                        </div>
                    </div>
                    <div class="clearfix"></div>
                </div>
            </div>
        </div>
    </div>

    <p-dialog
        header="RESET PASSWORD"
        [(visible)]="getotp"
        [modal]="true"
        [style]="{ width: '500px' }"
        [closable]="true"
        [draggable]="false"
        (onHide)="closeResetPwd()"
    >
        <div class="modal-body">
            <form [formGroup]="searchPartnerForm">
                <div class="form-group-custom">
                    <label class="control-label-new">Username</label>
                    <input type="text" class="form-control-new" placeholder="Enter Username" formControlName="userName" />
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="submit" class="btn-login-gradient btn-sm" (click)="searchResellerByName()" [disabled]="!searchPartnerForm.valid">
                <i class="fa fa-paper-plane"></i> GET OTP
            </button>
            <button type="button" class="btn-cancel" (click)="closeResetPwd()">Close</button>
        </div>
    </p-dialog>

    <p-dialog
        header="CHANGE PASSWORD"
        [(visible)]="changePasswordModal"
        [modal]="true"
        [style]="{ width: '600px' }"
        [closable]="true"
        [draggable]="false"
        (onHide)="CloseChangePassword()"
    >
        <div class="modal-body">
            <div class="success-alert" style="margin-bottom: 20px;">
                <i class="fa fa-check-circle"></i> OTP sent successfully
            </div>
            <form [formGroup]="changePasswordForm">
                <div class="form-group-custom">
                    <input type="text" class="form-control-new" placeholder="Enter OTP" formControlName="otp" />
                    <div class="resend-link-container">
                        <span (click)="getOtp()" class="resend-text">Resend OTP</span>
                    </div>
                </div>

                <div class="form-group-custom">
                    <div class="input-wrapper">
                        <input [type]="_passwordNewType" class="form-control-new" placeholder="Enter New Password" formControlName="newPassword" />
                        <span class="password-toggle" (click)="showNewPassword = !showNewPassword; _passwordNewType = showNewPassword ? 'text' : 'password'">
                            <i class="fa" [ngClass]="showNewPassword ? 'fa-eye' : 'fa-eye-slash'"></i>
                        </span>
                    </div>
                </div>

                <div class="form-group-custom">
                    <div class="input-wrapper">
                        <input [type]="_passwordconfirmType" class="form-control-new" placeholder="Confirm New Password" formControlName="confirmNewPassword" />
                        <span class="password-toggle" (click)="showconfirmPassword = !showconfirmPassword; _passwordconfirmType = showconfirmPassword ? 'text' : 'password'">
                            <i class="fa" [ngClass]="showconfirmPassword ? 'fa-eye' : 'fa-eye-slash'"></i>
                        </span>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="submit" class="btn-login-gradient" (click)="validateOTPChangePassword()" [disabled]="!changePasswordForm.valid">
                <i class="fa fa-refresh"></i> RESET PASSWORD
            </button>
        </div>
    </p-dialog>

    <style>
        .auth-title { font-size: 1.8rem; font-weight: bold; color: #001f3f; margin-top: 10px; }
        .control-label-new { text-align: left; font-size: 0.85rem; color: #666; font-weight: 700; display: block; margin-bottom: 5px; }
        .form-group-custom { margin-bottom: 22px; text-align: left; }
        .input-wrapper { position: relative; border-bottom: 1.5px solid #ccc; transition: 0.3s; }
        .input-wrapper:focus-within { border-bottom-color: #0074D9; }
        .form-control-new { width: 100%; border: none !important; padding: 10px 10px 10px 35px; background: transparent; outline: none; font-size: 0.95rem; box-shadow: none !important; }
        .input-icon { position: absolute; left: 5px; top: 12px; color: #aaa; font-size: 1.1rem; }
        .password-toggle { position: absolute; right: 5px; top: 12px; cursor: pointer; color: #888; }
        .btn-login-gradient { 
            width: 100%; padding: 15px; border: none; border-radius: 25px; color: white; 
            font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 15px;
            background: linear-gradient(to right, #0074D9, #3f0038); 
            box-shadow: 0 4px 15px rgba(0, 116, 217, 0.3); transition: 0.3s;
        }
        .btn-login-gradient:hover { transform: translateY(-1px); opacity: 0.9; }
        .forgot-pwd-link { text-align: right; margin-top: -10px; }
        .forgot-pwd-link a { font-size: 0.85rem; color: #555; text-decoration: none; }
        .error-msg { color: #dc3545; font-size: 0.75rem; margin-top: 2px; font-weight: 600; }
        .resend-text { color: #0074D9; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .success-alert { background: #e6fffa; color: #20c997; padding: 10px; border-radius: 5px; font-weight: bold; }
        .btn-cancel { background: #eee; border: none; padding: 8px 15px; border-radius: 4px; margin-left: 10px; cursor: pointer; }
    </style>
</body>
</html>
