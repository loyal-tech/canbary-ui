<div class="row">
  <div class="col-md-12">
    <!-- User Data -->
    <div class="panel top">
      <div class="panel-heading">
        <h3 class="panel-title">Radius Client Management</h3>
        <div class="right">
          <button
            type="button"
            class="btn-toggle-collapse"
            data-toggle="collapse"
            data-target="#radiusClientSearchPanel"
            aria-expanded="false"
            aria-controls="radiusClientSearchPanel"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>
      <div id="radiusClientSearchPanel" class="panel-collapse collapse in">
        <div class="panel-body">
          <div class="searchForm">
            <form class="form-auth-small" [formGroup]="searchClientForm">
              <div class="row">
                <div class="col-md-3" style="padding-right: 0%; text-align: right">
                  <label style="padding: 5px">Client IP Address:</label>
                </div>
                <div class="col-md-5" style="padding-left: 0%">
                  <input
                    type="text"
                    name="clientIp"
                    class="form-control"
                    placeholder="Enter Client IP Address"
                    formControlName="clientIpAddress"
                    (keydown.enter)="searchClientByIp()"
                    [ngClass]="{
                      'is-invalid':
                        searchSubmitted && searchClientForm.controls.clientIpAddress.errors
                    }"
                  />
                </div>
                <div class="col-md-4" style="padding-left: 0%">
                  <button
                    type="submit"
                    class="btn btn-primary"
                    title="Search Radius Client"
                    data-toggle="tooltip"
                    (click)="searchClientByIp()"
                  >
                    <i class="fa fa-search"></i>
                    Search
                  </button>
                  &nbsp;
                  <button
                    type="reset"
                    class="btn btn-default"
                    title="Clear"
                    data-toggle="tooltip"
                    (click)="clearSearchForm()"
                  >
                    <i class="fa fa-refresh"></i>
                    Clear
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <!-- END User Data -->
  </div>
</div>
<div class="row">
  <div class="col-md-12 col-sm-12">
    <div class="panel">
      <div class="panel-heading">
        <h3 class="panel-title">Radius Clients</h3>
        <div class="right">
          <button
            aria-controls="listPreCust"
            aria-expanded="false"
            class="btn-toggle-collapse"
            data-target="#listPreCust"
            data-toggle="collapse"
            type="button"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>

      <div class="panel-collapse collapse in" id="listPreCust">
        <div class="panel-body table-responsive">
          <div class="row">
            <div class="col-lg-12 col-md-12">
              <table class="table">
                <thead>
                  <tr>
                    <th>Client IP</th>
                    <th>Vendor</th>
                    <th>Shared Key</th>
                    <th>IP Type</th>
                    <th>ISP Name</th>
                    <th *ngIf="editAccess || deleteAccess">Action</th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    *ngFor="
                      let client of clientDataList
                        | paginate
                          : {
                              id: 'listing_groupdata',
                              itemsPerPage: itemsPerPage,
                              currentPage: currentPage,
                              totalItems: totalRecords
                            };
                      index as i
                    "
                  >
                    <td>
                      <a
                        (click)="showClientDetail(client.clientId)"
                        title="Click To See Plan Detail"
                        style="color: #f7b206"
                        class="curson_pointer"
                      >
                        {{ client.clientIpAddress }}
                      </a>
                    </td>
                    <td>
                      {{
                        client.vendor == null || client.vendor == "" || client.vendor == undefined
                          ? "-"
                          : client.vendor
                      }}
                    </td>
                    <td>{{ client.sharedKey }}</td>
                    <td>{{ client.ipType }}</td>
                    <td>{{ client.mvnoName }}</td>
                    <td *ngIf="editAccess || deleteAccess" class="btnAction">
                      <a
                        *ngIf="editAccess"
                        type="button"
                        data-title="Edit"
                        data-toggle="tooltip"
                        class="curson_pointer"
                        [routerLink]="['/home/radiusclient/edit/', client.clientId, client.mvnoId]"
                      >
                        <img src="assets/img/ioc01.jpg" />
                      </a>
                      <a
                        *ngIf="deleteAccess"
                        data-title="Delete"
                        data-toggle="tooltip"
                        class="curson_pointer"
                        (click)="deleteConfirm(client.clientId, client.mvnoId, i)"
                      >
                        <img src="assets/img/ioc02.jpg" />
                      </a>
                    </td>
                  </tr>
                </tbody>
              </table>
              <div style="display: flex">
                <pagination-controls
                  id="listing_groupdata"
                  [maxSize]="10"
                  [directionLinks]="true"
                  previousLabel=""
                  nextLabel=""
                  (pageChange)="pageChanged($event)"
                ></pagination-controls>

                <div id="itemPerPageDropdown">
                  <p-dropdown
                    [options]="pageLimitOptions"
                    optionLabel="value"
                    optionValue="value"
                    (onChange)="TotalItemPerPage($event)"
                  ></p-dropdown>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<p-dialog
  header="{{ client.clientIpAddress }} Detail"
  [(visible)]="modalToggle"
  [modal]="true"
  [style]="{ width: '40vw' }"
  [draggable]="false"
  [resizable]="false"
  [responsive]="true"
  [closable]="true"
  (onHide)="closeClientDetailsModel()"
>
  <div class="modal-body">
    <div class="container-fluid">
      <div class="row" id="viewDetail">
        <div class="col-md-5">
          <label for="name">Client IP Address :</label>
        </div>
        <div class="col-md-7">
          <label for="nameValue">{{ client.clientIpAddress }}</label>
        </div>
      </div>
      <div class="row" id="viewDetail">
        <div class="col-md-5">
          <label for="type">Shared Key :</label>
        </div>
        <div class="col-md-7">
          <label for="typeValue">{{ client.sharedKey }}</label>
        </div>
      </div>
      <div class="row" id="viewDetail">
        <div class="col-md-5">
          <label for="quota">TimeOut :</label>
        </div>
        <div class="col-md-7">
          <label for="quotaValue">{{ client.timeOut }}</label>
        </div>
      </div>
      <div class="row" id="viewDetail">
        <div class="col-md-5">
          <label for="uom">IP Type :</label>
        </div>
        <div class="col-md-7">
          <label for="uomValue">{{ client.ipType }}</label>
        </div>
      </div>
      <div class="row" id="viewDetail">
        <div class="col-md-5">
          <label for="uom">Client Group Id :</label>
        </div>
        <div class="col-md-7">
          <label for="uomValue">{{ client.clientGroupId }}</label>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-default" (click)="closeClientDetailsModel()">Close</button>
  </div>
</p-dialog>
