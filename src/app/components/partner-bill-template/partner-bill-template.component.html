<div class="row">
  <div class="col-md-12">
    <div class="panel top">
      <div class="panel-heading">
        <h3 class="panel-title">Partner Generate Bill Run</h3>
        <div class="right">
          <button
            type="button"
            class="btn-toggle-collapse"
            data-toggle="collapse"
            data-target="#genratebill"
            aria-expanded="false"
            aria-controls="genratebill"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>

      <div id="genratebill" class="panel-collapse collapse in">
        <div class="panel-body">
          <form [formGroup]="searchGenerateBillRunFormGroup">
            <div>Bill Date</div>
            <div class="row">
              <div class="col-lg-3 col-md-4 col-sm-6 col-xs-12">
                <div class="form-group">
                  <p-calendar
                    placeholder="Enter Date"
                    formControlName="billGenerateDate"
                    [maxDate]="maxDate"
                    [readonlyInput]="true"
                    [ngClass]="{
                      'is-invalid':
                        submitted && searchGenerateBillRunFormGroup.controls.billGenerateDate.errors
                    }"
                    [showIcon]="true"
                  ></p-calendar>
                  <div
                    class="errorWrap text-danger"
                    *ngIf="
                      submitted && searchGenerateBillRunFormGroup.controls.billGenerateDate.errors
                    "
                  >
                    <div
                      class="error text-danger"
                      *ngIf="
                        submitted &&
                        searchGenerateBillRunFormGroup.controls.billGenerateDate.errors.required
                      "
                    >
                      Bill Date is required.
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-lg-6 col-md-6 col-sm-6 col-xs-12">
                <button type="submit" class="btn btn-primary" (click)="searchBillRun()">
                  <i class="fa fa-search"></i>
                  Generate Bill Run
                </button>
                <button
                  type="submit"
                  class="btn btn-default"
                  id="searchbtn"
                  (click)="clearBillRun()"
                >
                  <i class="fa fa-refresh"></i>
                  Clear
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
