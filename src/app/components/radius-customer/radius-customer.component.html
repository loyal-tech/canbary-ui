<div class="row" *ngIf="isShowMenu">
  <div class="col-md-12">
    <!-- User Data -->
    <div class="panel top">
      <div class="panel-heading">
        <h3 class="panel-title">Radius Customer Management</h3>
        <div class="right">
          <button
            type="button"
            class="btn-toggle-collapse"
            data-toggle="collapse"
            data-target="#radiusCustomerSearchPanel"
            aria-expanded="false"
            aria-controls="radiusCustomerSearchPanel"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>
      <div *ngIf="independentAAA" class="panel-collapse collapse in" id="searchPreCust">
        <div class="panel-body no-padding panel-udata">
          <div [ngClass]="'col-md-6'" class="pcol">
            <div>
              <a
                [routerLink]="['/home/radiuscustomer/radiuscreatecustomer']"
                class="curson_pointer"
                href="javascript:void(0)"
                class="dbox"
              >
                <img src="../../../assets/img/i01.png" style="width: 32px" />
                <h5>Create Radius Customer</h5>
              </a>
              <div
                *ngIf="isShowCreateView"
                [ngClass]="{
                  activeSubMenu: true
                }"
              ></div>
            </div>
          </div>
          <div [ngClass]="'col-md-6'" class="pcol">
            <div>
              <a
                [routerLink]="['/home/radiuscustomer/list']"
                class="curson_pointer"
                href="javascript:void(0)"
                class="dbox"
              >
                <img src="../../../assets/img/i01.png" style="width: 32px" />
                <h5>Search Radius Customer</h5>
              </a>
              <div
                [ngClass]="{
                  activeSubMenu: true
                }"
                *ngIf="isShowListView"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- END User Data -->
  </div>
</div>

<router-outlet> </router-outlet>
