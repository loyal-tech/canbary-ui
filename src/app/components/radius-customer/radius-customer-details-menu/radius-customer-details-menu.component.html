<div class="row">
  <div class="col-md-12">
    <div class="panel mb-15">
      <div class="panel-heading">
        <h3 class="panel-title">Radius Customer Management</h3>
        <br />
        <div class="panel-collapse collapse in" id="searchPreCust">
          <div class="row panel-udata">
            <div class="col-md-4 pcol pcolumn">
              <div
                [ngClass]="{
                  activeSubMenu: isDetails
                }"
                class="dbox"
              >
                <a class="curson_pointer" href="javascript:void(0)" [routerLink]="['x/' + custId]">
                  <img src="../../../assets/img/i01.png" style="width: 32px" />
                  <h5>Home</h5>
                </a>
              </div>
            </div>
            <div class="col-md-4 pcol pcolumn">
              <div
                [ngClass]="{
                  activeSubMenu: isPlan
                }"
                class="dbox"
              >
                <a class="curson_pointer" [routerLink]="['plans/' + custId]">
                  <img src="../../../assets/img/i01.png" style="width: 32px" />
                  <h5>Customer Plans</h5>
                </a>
              </div>
            </div>
            <div class="col-md-4 pcol pcolumn">
              <div
                [ngClass]="{
                  activeSubMenu: isCDR
                }"
                class="dbox"
              >
                <a [routerLink]="['cdr/' + custId]" class="curson_pointer">
                  <img src="../../../assets/img/i01.png" style="width: 32px" />
                  <h5>CDR Session</h5>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <router-outlet> </router-outlet>
  </div>
</div>
