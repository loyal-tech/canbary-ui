<div class="row">
  <div class="col-md-12">
    <div class="panel top">
      <div class="panel-heading">
        <h3 class="panel-title">Trail Bill</h3>
        <div class="right">
          <!-- <button type="button" class="btn-toggle-collapse">
            <i class="fa fa-minus-circle"></i>
          </button> -->
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-12">
    <div class="panel">
      <div class="panel-heading" style="min-height: 2rem">
        <!-- <h3 class="panel-title">Trail Bill</h3> -->
        <div class="right">
          <button
            type="button"
            class="btn-toggle-collapse"
            data-toggle="collapse"
            data-target="#billDD"
            aria-expanded="false"
            aria-controls="billDD"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>

      <div id="billDD" class="panel-collapse collapse in">
        <div class="panel-body">
          <form [formGroup]="searchtrailBillFormGroup">
            <div class="row">
              <div class="col-lg-3 col-md-3 col-sm-6 col-xs-12">
                <label>Bill Run</label>
                <div>
                  <p-dropdown
                    [options]="commondropdownService.billRunMasterList"
                    optionValue="id"
                    optionLabel="id"
                    filter="true"
                    filterBy="id"
                    placeholder="Select a Bill Run ID"
                    formControlName="billrunid"
                  ></p-dropdown>
                </div>
                <br />
              </div>
              <div class="col-lg-3 col-md-3 col-sm-6 col-xs-12">
                <label>Bill From Date</label>
                <input
                  type="date"
                  class="form-control"
                  placeholder="Enter Pay From Date"
                  formControlName="billfromdate"
                />
                <br />
              </div>
              <div class="col-lg-3 col-md-3 col-sm-6 col-xs-12">
                <label>Bill To Date</label>
                <input
                  type="date"
                  class="form-control"
                  placeholder="Enter Pay To Date"
                  formControlName="billtodate"
                />
                <br />
              </div>
            </div>
            <div class="addUpdateBtn">
              <button
                type="submit"
                class="btn btn-primary"
                id="searchbtn"
                (click)="searchtrailBill('')"
              >
                <i class="fa fa-search"></i>
                Trail Bill
              </button>
              <button
                type="submit"
                class="btn btn-default"
                id="searchbtn"
                (click)="clearSearchtrailBill()"
              >
                <i class="fa fa-refresh"></i>
                Clear
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-12" *ngIf="isInvoiceSearch">
    <div class="panel">
      <div class="panel-heading">
        <h3 class="panel-title">Trial Bill</h3>
        <div class="right">
          <button
            type="button"
            class="btn-toggle-collapse"
            data-toggle="collapse"
            data-target="#invoiceSearch"
            aria-expanded="false"
            aria-controls="invoiceSearch"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>

      <div id="invoiceSearch" class="panel-collapse collapse in">
        <div
          class="panel-body table-responsive"
          *ngIf="searchTrialBillData && searchTrialBillData.length !== 0"
        >
          <div class="row">
            <div class="col-lg-12 col-md-12">
              <table class="table">
                <thead>
                  <tr>
                    <th>Amount</th>
                    <th>Bill Run Count</th>
                    <th>Run Date</th>
                    <th>Bill Run Finish Date</th>
                    <th style="width: 18%">Status</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    *ngFor="
                      let data of searchTrialBillData
                        | paginate
                          : {
                              id: 'searchtrailBillPageData',
                              itemsPerPage: trailBillitemsPerPage,
                              currentPage: currentPagetrailBillSlab,
                              totalItems: trailBilltotalRecords
                            };
                      index as i
                    "
                  >
                    <td>{{ data.amount }}</td>
                    <td>{{ data.billruncount }}</td>
                    <td>{{ data.rundate }}</td>
                    <td>{{ data.billrunfinishdate }}</td>
                    <td>
                      <div *ngIf="data.status == 'Y'">
                        <span class="badge badge-success">Active</span>
                      </div>
                      <div *ngIf="data.status == 'N'">
                        <span class="badge badge-danger">Inactive</span>
                      </div>
                      <div *ngIf="data.status !== 'Y'">
                        <span class="badge badge-info">{{ data.status }}</span>
                      </div>
                    </td>
                    <td class="btnAction">
                      <a
                        id="download-button"
                        type="button"
                        class="displayflex curson_pointer"
                        (click)="generatePDF(data.id)"
                        title="Generate"
                        *ngIf="data.status === 'Generated'"
                      >
                        <img
                          style="width: 25px; height: 25px; border-radius: 3px"
                          src="assets/img/pdf.png"
                        />
                      </a>
                    </td>
                  </tr>
                </tbody>
              </table>
              <br />
              <div class="pagination_Dropdown">
                <pagination-controls
                  id="searchtrailBillPageData"
                  maxSize="10"
                  directionLinks="true"
                  previousLabel=""
                  nextLabel=""
                  (pageChange)="pageChangedtrailBillList($event)"
                ></pagination-controls>
                <div id="itemPerPageDropdown">
                  <p-dropdown
                    [options]="pageLimitOptions"
                    optionLabel="value"
                    optionValue="value"
                    (onChange)="TotalItemPerPage($event)"
                  ></p-dropdown>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="panel-body table-responsive" *ngIf="searchTrialBillData.length === 0">
          Details are not available
        </div>
      </div>
    </div>
  </div>
</div>
