<div class="row">
  <div class="col-md-12">
    <div class="panel top">
      <div class="panel-heading">
        <h3 class="panel-title">{{ title }} Management</h3>
        <div class="right">
          <button
            type="button"
            class="btn-toggle-collapse"
            data-toggle="collapse"
            data-target="#searchDataSector"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>
      <div id="searchDataSector" class="panel-collapse collapse in">
        <div id="" class="panel-body">
          <div class="row">
            <div class="col-lg-3 col-md-3">
              <input
                id="taxName"
                type="text"
                [(ngModel)]="searchVendorName"
                class="form-control"
                placeholder="Global Search Filter"
                (keydown.enter)="searchVendor()"
              />
            </div>
            <div class="col-lg-3 col-md-4 marginTopSearchBtn">
              <button type="button" class="btn btn-primary" id="searchbtn" (click)="searchVendor()">
                <i class="fa fa-search"></i>
                Search
              </button>
              <button
                type="reset"
                class="btn btn-default"
                id="searchbtn"
                (click)="clearSearchVendor()"
              >
                <i class="fa fa-refresh"></i>
                Clear
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="row">
  <div class="col-md-6 left">
    <div class="panel">
      <div class="panel-heading">
        <h3 class="panel-title">{{ title1 }}</h3>
        <div class="right">
          <button
            type="button"
            class="btn-toggle-collapse"
            data-toggle="collapse"
            data-target="#allDataSector"
            aria-expanded="false"
            aria-controls="allDataSector"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>
      <div id="allDataSector" class="panel-collapse collapse in">
        <div class="panel-body table-responsive">
          <div class="row">
            <div class="col-lg-12 col-md-12">
              <table class="table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th *ngIf="deleteAccess || editAccess">Action</th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    *ngFor="
                      let Vendor of vendorListData
                        | paginate
                          : {
                              id: 'casListDataID',
                              itemsPerPage: vendoritemsPerPage,
                              currentPage: currentPageVendorSlab,
                              totalItems: vendortotalRecords
                            };
                      index as i
                    "
                  >
                    <td>{{ Vendor.name }}</td>
                    <td *ngIf="Vendor.status == 'ACTIVE' || Vendor.status == 'Active'">
                      <span class="badge badge-success">Active</span>
                    </td>
                    <td *ngIf="Vendor.status == 'INACTIVE' || Vendor.status == 'Inactive'">
                      <span class="badge badge-danger">Inactive</span>
                    </td>
                    <td class="btnAction" *ngIf="deleteAccess || editAccess">
                      <button
                        *ngIf="editAccess"
                        id="edit-button"
                        href="javascript:void(0)"
                        title="Edit"
                        type="button"
                        style="border: none; background: transparent; padding: 0; margin-right: 3px"
                        (click)="editVendor(Vendor.id)"
                      >
                        <img src="assets/img/ioc01.jpg" />
                      </button>
                      <button
                        title="Delete"
                        *ngIf="deleteAccess"
                        id="delete-button"
                        href="javascript:void(0)"
                        type="button"
                        style="border: none; background: transparent; padding: 0; margin-right: 3px"
                        (click)="deleteConfirmonSector(Vendor)"
                      >
                        <img src="assets/img/ioc02.jpg" />
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>

              <div class="row">
                <div class="col-md-12" style="display: flex">
                  <pagination-controls
                    id="casListDataID"
                    maxSize="10"
                    directionLinks="true"
                    previousLabel=""
                    nextLabel=""
                    (pageChange)="pageChangedCasList($event)"
                  ></pagination-controls>
                  <div id="itemPerPageDropdown">
                    <p-dropdown
                      [(ngModel)]="vendoritemsPerPage"
                      [options]="pageLimitOptions"
                      optionLabel="value"
                      optionValue="value"
                      (onChange)="TotalItemPerPage($event)"
                    ></p-dropdown>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-6 right">
    <div class="panel">
      <div class="panel-heading">
        <h3 class="panel-title">{{ isVendorEdit ? "Update" : "Create" }} {{ title1 }}</h3>
        <div class="right">
          <button
            type="button"
            class="btn-toggle-collapse"
            data-toggle="collapse"
            data-target="#createDataCountry"
            aria-expanded="false"
            aria-controls="createDataCountry"
          >
            <i class="fa fa-minus-circle"></i>
          </button>
        </div>
      </div>
      <div id="createDataCountry" class="panel-collapse collapse in">
        <!-- <div class="panel-body table-responsive"></div> -->
        <div class="panel-body">
          <div class="panel-body table-responsive" *ngIf="!createAccess && !isVendorEdit">
            Sorry you have not privilege to create operation!
          </div>
          <div class="panel-body" *ngIf="createAccess || (isVendorEdit && editAccess)">
            <form [formGroup]="vendorFormGroup">
              <label>{{ title1 }} Name*</label>
              <input
                id="name"
                type="text"
                class="form-control"
                placeholder="Enter {{ title1 }} Name"
                formControlName="name"
                [ngClass]="{
                  'is-invalid': submitted && vendorFormGroup.controls.name.errors
                }"
              />
              <div
                class="errorWrap text-danger"
                *ngIf="submitted && vendorFormGroup.controls.name.errors"
              >
                <div
                  class="error text-danger"
                  *ngIf="submitted && vendorFormGroup.controls.name.errors.required"
                >
                  {{ title }} Name is required.
                </div>
              </div>
              <br />
              <label>Status*</label>
              <div>
                <p-dropdown
                  [options]="statusOptions"
                  optionValue="label"
                  optionLabel="label"
                  filter="true"
                  filterBy="label"
                  placeholder="Select a Status"
                  formControlName="status"
                  [ngClass]="{
                    'is-invalid': submitted && vendorFormGroup.controls.status.errors
                  }"
                ></p-dropdown>
              </div>
              <div
                class="errorWrap text-danger"
                *ngIf="submitted && vendorFormGroup.controls.status.errors"
              >
                <div
                  class="error text-danger"
                  *ngIf="submitted && vendorFormGroup.controls.status.errors.required"
                >
                  {{ title }} Status is required.
                </div>
              </div>
              <br />
              <div class="addUpdateBtn">
                <button
                  type="submit"
                  class="btn btn-primary"
                  id="submit"
                  (click)="addEditVendor('')"
                  *ngIf="!isVendorEdit"
                  [disabled]="!vendorFormGroup.valid"
                >
                  <i class="fa fa-check-circle"></i>
                  Add {{ title }}
                </button>
                <button
                  type="submit"
                  class="btn btn-primary"
                  *ngIf="isVendorEdit"
                  id="submit"
                  (click)="addEditVendor(viewVendorListData.id)"
                  [disabled]="!vendorFormGroup.valid"
                >
                  <i class="fa fa-check-circle"></i>
                  Update {{ title }}
                </button>
                <br />
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
