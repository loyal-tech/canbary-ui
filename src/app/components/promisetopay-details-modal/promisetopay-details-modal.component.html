<!-- Modal -->
<div
  class="modal fade"
  id="{{ dialogId }}"
  tabindex="-1"
  role="dialog"
  aria-labelledby="myModalLabel"
>
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
        <h4 class="modal-title" id="myModalLabel" style="color: #fff !important">Promise To Pay Details</h4>
      </div>

      <div class="modal-body">
        <div class="panel-body table-responsive">
          <div class="row">
            <div class="col-lg-12 col-md-12">
              <table class="table">
                <thead>
                  <tr>
                    <!-- <th>Service</th> -->
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Promise To Pay Days</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="
                  let plan of promiseToPayData
                ">
                    <td>{{plan.startDate}}</td>
                    <td>{{plan.endDate}}</td>
                    <td>{{plan.days}}</td>
                  </tr>
                </tbody>
              </table>
              <br />
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal" (click)="promiseToPayData=[]">Close</button>
      </div>
    </div>
  </div>
</div>
