
<p-dialog
    header="Plan Charge"
    [(visible)]="planChargeModal"
    [modal]="true"
    [style]="{ width: '600px' }"
    [closable]="true"
    [draggable]="false"
    (onHide)="closeChargeModal()"
  >
        <div class="modal-body">
          <div class="row">
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12">
              <label>Plan Price *</label>
              <input
                class="form-control"
                [(ngModel)]="planCharge.amount"
                id="amount"
                min="1"
                placeholder="Enter Plan Price"
                type="number"
                readonly
              />
              <br />
            </div>
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12">
              <label>New Offer Price</label>
              <input
                class="form-control"
                [(ngModel)]="planCharge.newOfferPrice"
                id="newOfferPrice"
                min="1"
                placeholder="Enter Offer Price"
                type="number"
                readonly
              />
              <br />
            </div>
          </div>
          <div class="scrollbarPlangroupMappingList" style="margin-top: 15px">
            <table class="table coa-table">
              <thead>
                <tr>
                  <th style="text-align: center">Charge Name</th>
                  <th style="text-align: center">New Charge Name</th>
                  <th style="text-align: center">Actual Price</th>
                  <th style="text-align: center">Charge Price</th>
                  <th style="text-align: center">Tax Amount</th>
                  <th style="text-align: center">Price(including tax)</th>
                </tr>
              </thead>
              <tbody>
                <tr
                  *ngFor="
                    let row of chargeFromArray.controls
                      | paginate
                        : {
                            id: 'chargeFromArrayData',
                            itemsPerPage: chargeitemsPerPage,
                            currentPage: currentPageCharge,
                            totalItems: chargetotalRecords
                          };
                    let index = index
                  "
                >
                  <td style="padding-left: 8px">
                    <p-dropdown
                      [disabled]="true"
                      [formControl]="row.get('id')"
                      [options]="planCharge.chargeList"
                      filter="true"
                      filterBy="charge.name"
                      optionLabel="charge.name"
                      optionValue="charge.id"
                      placeholder="Select a Charge"
                    ></p-dropdown>
                    <div></div>
                  </td>
                  <td>
                    <input
                      [formControl]="row.get('newchargename')"
                      class="form-control"
                      id="newchargename"
                      name="newchargename"
                      placeholder="Enter New Charge Price"
                      type="text"
                    />
                  </td>
                  <td>
                    <input
                      [formControl]="row.get('actualprice')"
                      class="form-control"
                      id="actualprice"
                      min="0"
                      name="actualprice"
                      placeholder="Enter Actual Price"
                      type="number"
                      [readonly]="true"
                    />
                  </td>
                  <td>
                    <input
                      [formControl]="row.get('chargeprice')"
                      class="form-control"
                      id="chargeprice"
                      min="0"
                      name="chargeprice"
                      placeholder="Enter Charge Price"
                      type="number"
                      (input)="changeActualPrice(row.value.chargeprice, row.value.id, index)"
                    />
                  </td>

                  <td>
                    <div
                      style="
                        box-shadow: 0px 1px 2px 0 rgb(0 0 0 / 22%);
                        border-radius: 2px;
                        border-color: #eaeaea;
                        background-color: #eeeeee;
                        display: block;
                        width: 100%;
                        height: 34px;
                        padding: 6px 12px;
                        font-size: 14px;
                        line-height: 1.42857143;
                        color: #555;
                        background-image: none;
                      "
                    >
                      <span *ngFor="let list of chargeTaxAmountArray; index as j">
                        <span *ngIf="index === j">
                          {{ list | number : "1.2-2" }}
                        </span>
                      </span>
                    </div>
                  </td>
                  <td>
                    <div
                      style="
                        box-shadow: 0px 1px 2px 0 rgb(0 0 0 / 22%);
                        border-radius: 2px;
                        border-color: #eaeaea;
                        background-color: #eeeeee;
                        display: block;
                        width: 100%;
                        height: 34px;
                        padding: 6px 12px;
                        font-size: 14px;
                        line-height: 1.42857143;
                        color: #555;
                        background-image: none;
                      "
                    >
                      <span *ngFor="let list of totalPriceData; index as j">
                        <span *ngIf="index === j">{{ list }}</span>
                      </span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer" style="display: flex; justify-content: flex-end">
          <div class="addUpdateBtn">
            <button
              type="button"
              class="btn btn-primary"
              data-title="Update Discount Details"
              (click)="saveChargeData()"
              data-dismiss="modal"
            >
              Save
            </button>
          </div>
          <div class="addUpdateBtn" style="margin-left: 1.5rem">
            <button
              type="button"
              class="btn btn-danger btn-sm"
              data-dismiss="modal"
              (click)="closeChargeModal()"
            >
              Close
            </button>
          </div>
        </div>
</p-dialog>
