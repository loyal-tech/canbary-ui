  <body>
    <app-root></app-root>
    <!-- Javascript -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"
      integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg=="
      crossorigin="anonymous"
    ></script>
    <script src="../assets/vendor/jquery/jquery.min.js"></script>
    <!-- <script src="../assets/vendor/bootstrap/js/bootstrap.js"></script> -->
    <!-- <script src="../assets/vendor/bootstrap/js/bootstrap.min.js"></script> -->
    <script src="../assets/vendor/jquery-slimscroll/jquery.slimscroll.min.js"></script>
    <script src="../assets/vendor/jquery.easy-pie-chart/jquery.easypiechart.min.js"></script>
    <script src="../assets/vendor/chartist/js/chartist.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-3-typeahead/4.0.2/bootstrap3-typeahead.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/3.1.62/jquery.inputmask.bundle.js"></script>
    <script src="../assets/scripts/adopt-common.js"></script>
    <script>
      fetch("./assets/env.js", {
        method: "GET",
        headers: {
          "X-Script-Tag-Request": "true"
        }
      })
        .then(response => {
          if (response.ok) {
            return response.text();
          } else {
            throw new Error(`Failed to load env.js: ${response.status} ${response.statusText}`);
          }
        })
        .then(text => {
          eval(text);
          if (window.env && window.env.GOOGLE_MAPS_API_KEY) {
            var script = document.createElement("script");

            script.src = `https://maps.googleapis.com/maps/api/js?key=${window.env.GOOGLE_MAPS_API_KEY}&libraries=places,drawing,geometry&language=en`;

            document.head.appendChild(script);
          } else {
            console.error("Google Maps API key not found in env.js");
          }
        })
        .catch(error => {
          console.error("Error fetching env.js:", error);
        });
    </script>
    <div class="clearfix"></div>
  </body>
